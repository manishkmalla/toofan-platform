version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: toofan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toofan_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────
  toofan-backend:
    image: 041808556268.dkr.ecr.us-east-1.amazonaws.com/toofan-backend:latest
    build:
      context: ./toofan-backend
      dockerfile: Dockerfile
    container_name: toofan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/toofan_db?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      ESEWA_MERCHANT_ID: ${ESEWA_MERCHANT_ID}
      ESEWA_SECRET_KEY: ${ESEWA_SECRET_KEY}
      ESEWA_SUCCESS_URL: ${ESEWA_SUCCESS_URL}
      ESEWA_FAILURE_URL: ${ESEWA_FAILURE_URL}
      KHALTI_SECRET_KEY: ${KHALTI_SECRET_KEY}
      KHALTI_PUBLIC_KEY: ${KHALTI_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      UPLOAD_DRIVER: ${UPLOAD_DRIVER:-s3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      SPARROW_SMS_TOKEN: ${SPARROW_SMS_TOKEN}
      SPARROW_SMS_FROM: ${SPARROW_SMS_FROM:-TooFan}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      DISPATCH_RADIUS_KM: ${DISPATCH_RADIUS_KM:-5}
      DISPATCH_OFFER_TIMEOUT_SEC: ${DISPATCH_OFFER_TIMEOUT_SEC:-30}
      DISPATCH_MAX_RETRY: ${DISPATCH_MAX_RETRY:-3}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"

  # ── Frontend ────────────────────────────────
  toofan-frontend:
    image: 041808556268.dkr.ecr.us-east-1.amazonaws.com/toofan-frontend:latest
    build:
      context: ./toofan-frontend
      dockerfile: Dockerfile
    container_name: toofan-frontend
    restart: unless-stopped
    depends_on:
      - toofan-backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
  logs_data:
